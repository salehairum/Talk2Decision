<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk2Decision</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">📁 Uploaded Files</div>
            <ul class="file-list" id="file-list">
                <li style="padding: 20px; text-align: center; color: #999; font-size: 13px;">
                    No files uploaded yet
                </li>
            </ul>
        </div>

        <!-- Main content -->
        <div class="main">
            <!-- Upload -->
            <div class="upload-area">
                <h1>Talk2Decision</h1>
                <p>Upload Slack chat exports and extract decisions using AI</p>
                <div class="upload-form">
                    <input type="file" id="file-input" accept=".json" />
                    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                        📤 Choose File
                    </button>
                    <div class="file-name-display" id="file-name-display"></div>
                </div>
            </div>

            <!-- Processing status -->
            <div class="processing" id="processing-area" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text">
                    <span class="spinner"></span><strong id="progress-status">Loading...</strong>
                </div>
            </div>

            <!-- Query and results -->
            <div class="content" id="content-area">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <p>Upload a chat file to get started</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000";
        let currentFileId = null;
        let processingIntervalId = null;
        let llmOptions = null;

        // Handle file selection
        document.getElementById("file-input").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById("file-name-display").textContent = file.name;

            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch(`${API_BASE}/upload`, { method: "POST", body: formData });
                const data = await res.json();

                if (res.ok) {
                    currentFileId = data.file_id;
                    showProcessing(data.file_id);
                    pollProcessingStatus(data.file_id);
                } else {
                    showError(`Upload failed: ${data.error}`);
                }
            } catch (err) {
                showError(`Upload error: ${err.message}`);
            }
        });

        function showProcessing(fileId) {
            document.getElementById("processing-area").style.display = "block";
            document.getElementById("content-area").innerHTML = "";
        }

        function pollProcessingStatus(fileId) {
            if (processingIntervalId) clearInterval(processingIntervalId);

            processingIntervalId = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/status/${fileId}`);
                    const raw = await res.text();
                    let data = null;
                    try {
                        data = JSON.parse(raw);
                    } catch (parseErr) {
                        console.error("Status poll non-JSON response:", raw);
                        clearInterval(processingIntervalId);
                        showError(`Status endpoint returned non-JSON response (HTTP ${res.status}). Check backend logs.`);
                        return;
                    }

                    if (res.ok) {
                        document.getElementById("progress-fill").style.width = `${data.progress}%`;
                        const elapsed = Number.isInteger(data.step_elapsed_seconds)
                            ? ` (${data.step_elapsed_seconds}s in current step)`
                            : "";
                        document.getElementById("progress-status").textContent = `${data.message}${elapsed}`;

                        if (data.status === "completed") {
                            clearInterval(processingIntervalId);
                            document.getElementById("processing-area").style.display = "none";
                            loadFiles();
                            showQueryInterface();
                        } else if (data.status === "failed") {
                            clearInterval(processingIntervalId);
                            showError(`Processing failed: ${data.error}`);
                        }
                    } else {
                        console.error(`Status poll failed (${res.status}):`, data);
                        if (res.status === 404) {
                            // Backend may still be creating state right after upload.
                            return;
                        }
                        clearInterval(processingIntervalId);
                        showError(`Status check failed (HTTP ${res.status}): ${data.error || "Unknown error"}`);
                    }
                } catch (err) {
                    console.error("Status poll error:", err);
                }
            }, 500);
        }

        async function loadFiles() {
            try {
                const res = await fetch(`${API_BASE}/files`);
                const data = await res.json();

                if (res.ok && data.files.length > 0) {
                    const fileList = document.getElementById("file-list");
                    fileList.innerHTML = data.files
                        .map(
                            (f) => `
                        <li class="file-item ${f.file_id === currentFileId ? "active" : ""}" onclick="selectFile('${f.file_id}')">
                            <span class="file-item-name">📄 ${f.file_id}</span>
                            <span class="file-item-time">${new Date(f.uploaded_at).toLocaleDateString()}</span>
                        </li>
                    `
                        )
                        .join("");
                }
            } catch (err) {
                console.error("Load files error:", err);
            }
        }

        function selectFile(fileId) {
            currentFileId = fileId;
            loadFiles();
            showQueryInterface();
        }

        function showQueryInterface() {
            if (!currentFileId) return;

            const content = document.getElementById("content-area");
            content.innerHTML = `
                <div class="query-section">
                    <h2>🔍 Ask a question about this chat</h2>
                    <div class="query-input-group query-config-row">
                        <label for="llm-provider" class="query-config-label">Provider</label>
                        <select id="llm-provider" onchange="onProviderChange()"></select>
                        <label for="llm-model" class="query-config-label">Model</label>
                        <input type="text" id="llm-model" placeholder="Model name" />
                    </div>
                    <div class="query-input-group">
                        <input 
                            type="text" 
                            id="query-input" 
                            placeholder="e.g., What was the final decision on the feature?"
                            onkeydown="if(event.key==='Enter') runQuery()"
                        />
                        <button class="query-btn" onclick="runQuery()">Search</button>
                    </div>
                </div>
                <div id="results-area"></div>
            `;

            initializeLLMSelectors();
        }

        async function loadLLMOptions() {
            try {
                const res = await fetch(`${API_BASE}/llm/options`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to load LLM options");
                llmOptions = data;
            } catch (err) {
                console.error("LLM options error:", err);
                llmOptions = {
                    active_provider: "groq",
                    active_model: "llama-3.1-8b-instant",
                    providers: [
                        { name: "groq", default_model: "llama-3.1-8b-instant" },
                        { name: "gemini", default_model: "gemini-2.5-flash" },
                    ],
                };
            }
        }

        function initializeLLMSelectors() {
            const providerSelect = document.getElementById("llm-provider");
            const modelInput = document.getElementById("llm-model");
            if (!providerSelect || !modelInput || !llmOptions) return;

            providerSelect.innerHTML = llmOptions.providers
                .map((p) => `<option value="${p.name}">${p.name}</option>`)
                .join("");

            providerSelect.value = llmOptions.active_provider || "groq";
            const activeProvider = llmOptions.providers.find((p) => p.name === providerSelect.value);
            modelInput.value = llmOptions.active_model || (activeProvider ? activeProvider.default_model : "");
        }

        function onProviderChange() {
            const providerSelect = document.getElementById("llm-provider");
            const modelInput = document.getElementById("llm-model");
            if (!providerSelect || !modelInput || !llmOptions) return;

            const selectedProvider = providerSelect.value;
            const selected = llmOptions.providers.find((p) => p.name === selectedProvider);
            if (selected && selected.default_model) {
                modelInput.value = selected.default_model;
            }
        }

        async function runQuery() {
            const query = document.getElementById("query-input").value.trim();
            const llmProvider = (document.getElementById("llm-provider")?.value || "").trim();
            const llmModel = (document.getElementById("llm-model")?.value || "").trim();
            if (!query || !currentFileId) return;

            const queryBtn = document.querySelector(".query-btn");
            queryBtn.disabled = true;
            queryBtn.innerHTML = '<span class="spinner"></span>Searching...';

            try {
                const res = await fetch(`${API_BASE}/query`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        file_id: currentFileId,
                        query: query,
                        top_k: 8,
                        llm_provider: llmProvider,
                        llm_model: llmModel,
                    }),
                });

                const data = await res.json();

                if (res.ok) {
                    displayResult(query, data.decision, data.chunks_retrieved, data.llm);
                } else {
                    showError(`Query failed: ${data.error}`);
                }
            } catch (err) {
                showError(`Query error: ${err.message}`);
            } finally {
                queryBtn.disabled = false;
                queryBtn.innerHTML = "Search";
            }
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function parseNarrativeFromRawResponse(rawResponse, fallbackDecision) {
            const raw = String(rawResponse || "").trim();
            let finalDecision = String(fallbackDecision || "").trim();
            let explanation = "";
            let decisionMadeBy = "";
            let decisionTimestamp = "";
            let decisionMessage = "";

            if (!raw) {
                return {
                    finalDecision,
                    explanation,
                    decisionMadeBy,
                    decisionTimestamp,
                    decisionMessage,
                    hasNarrative: false,
                    raw,
                };
            }

            const cleaned = raw
                .replace(/^```json\s*/i, "")
                .replace(/^```\s*/i, "")
                .replace(/\s*```$/i, "")
                .trim();

            const finalMatch = cleaned.match(
                /Final Decision:\s*([\s\S]*?)(?:\n\s*This decision was made by|\n\s*Explanation:|\n\s*\{|$)/i
            );
            if (finalMatch && finalMatch[1]) {
                finalDecision = finalMatch[1].trim().replace(/^\"|\"$/g, "");
            }

            const attributionMatch = cleaned.match(
                /This decision was made by\s+([\s\S]*?)\s+at\s+([\s\S]*?),\s*as stated in the message:/i
            );
            if (attributionMatch) {
                decisionMadeBy = String(attributionMatch[1] || "").trim().replace(/^\"|\"$/g, "");
                decisionTimestamp = String(attributionMatch[2] || "").trim().replace(/^\"|\"$/g, "");
            }

            const messageMatch = cleaned.match(/as stated in the message:\s*\n\s*"([\s\S]*?)"/i);
            if (messageMatch && messageMatch[1]) {
                decisionMessage = messageMatch[1].trim();
            }

            const explanationMatch = cleaned.match(/Explanation:\s*([\s\S]*?)(?:\n\s*\{|$)/i);
            if (explanationMatch && explanationMatch[1]) {
                explanation = explanationMatch[1].trim().replace(/^\"|\"$/g, "");
            }

            return {
                finalDecision,
                explanation,
                decisionMadeBy,
                decisionTimestamp,
                decisionMessage,
                hasNarrative: Boolean(finalMatch || explanationMatch || attributionMatch || messageMatch),
                raw,
            };
        }

        function displayResult(query, decision, chunksCount, llmInfo) {
            const resultsArea = document.getElementById("results-area");
            const hasEvidence = decision.evidence && decision.evidence.length > 0;
            const confidenceScoreRaw = Number(
                decision.confidence_score ?? decision.confidence ?? 0
            );
            const confidenceScore = Number.isFinite(confidenceScoreRaw) ? confidenceScoreRaw : 0;
            const confidenceDisplay = confidenceScore.toFixed(6);
            const parsedNarrative = parseNarrativeFromRawResponse(decision.raw_response, decision.decision);
            const finalDecision = parsedNarrative.finalDecision || String(decision.decision || "").trim();
            const explanation = parsedNarrative.explanation;
            const decisionMadeBy = parsedNarrative.decisionMadeBy;
            const decisionTimestamp = parsedNarrative.decisionTimestamp;
            const decisionMessage = parsedNarrative.decisionMessage;
            const hasDecisionDetails = Boolean(decisionMadeBy || decisionTimestamp || decisionMessage || explanation);
            const showRawResponse = parsedNarrative.raw.length > 0 && !parsedNarrative.hasNarrative;

            resultsArea.innerHTML = `
                <div class="result">
                    <h3>Decision Extracted</h3>
                    <div class="decision-box">
                        <div class="decision-label">Final Decision</div>
                        <div class="decision-text">${escapeHtml(finalDecision)}</div>
                        <span class="confidence-badge">
                            Retrieval Score: ${escapeHtml(confidenceDisplay)}
                        </span>
                    </div>

                    ${
                        hasDecisionDetails
                            ? `
                        <div class="decision-details-box">
                            <div class="decision-label">Decision Details</div>
                            <div class="decision-details-meta">
                                This decision was made by <strong>${escapeHtml(decisionMadeBy || "Unknown")}</strong>
                                at <strong>${escapeHtml(decisionTimestamp || "Unknown time")}</strong>
                            </div>
                            <div class="decision-details-quote-label">As stated in the message</div>
                            <div class="decision-details-quote">"${escapeHtml(decisionMessage || "No explicit decision message found.")}"</div>
                            <div class="decision-details-explanation-label">Explanation</div>
                            <div class="decision-details-explanation">${escapeHtml(explanation || "No explanation was returned by the model.")}</div>
                        </div>
                    `
                            : ""
                    }

                    <div class="evidence-box">
                        <div class="decision-label">Evidence</div>
                        ${
                            hasEvidence
                                ? `
                            <p class="evidence-summary">
                                Found in <strong>${escapeHtml(chunksCount)}</strong> relevant messages:
                            </p>
                            <div class="evidence">
                                ${decision.evidence
                                    .map(
                                        (e) => `
                                    <div class="evidence-item">
                                        <div class="evidence-author">@${escapeHtml(e.user)}</div>
                                        <div class="evidence-text">"${escapeHtml(e.text)}"</div>
                                        <div class="evidence-time">${escapeHtml(e.timestamp)}</div>
                                    </div>
                                `
                                    )
                                    .join("")}
                            </div>
                        `
                                : `<p style="font-size: 13px; color: #999; margin-top: 10px;">No supporting evidence found.</p>`
                        }
                    </div>

                    ${
                        showRawResponse
                            ? `
                        <div style="margin-top: 14px; padding: 12px; background: #f9f9fb; border: 1px solid #ececf2; border-radius: 8px;">
                            <div style="font-size: 12px; color: #666; margin-bottom: 6px;">Model response</div>
                            <div style="font-size: 13px; line-height: 1.5; white-space: pre-wrap; color: #2e2e35;">${escapeHtml(parsedNarrative.raw)}</div>
                        </div>
                    `
                            : ""
                    }
                </div>
            `;
        }

        function showError(message) {
            const resultsArea = document.getElementById("results-area") || document.getElementById("content-area");
            resultsArea.innerHTML = `<div class="error">❌ ${message}</div>`;
        }

        // Load initial file list and available models
        loadLLMOptions().then(() => {
            loadFiles();
        });
    </script>
</body>
</html>
